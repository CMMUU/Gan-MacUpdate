<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpdateMate Dashboard</title>
    <meta name="description" content="View your current update strategy, trial or license state, and renewal reminders in UpdateMate." />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://example.com/dashboard.html" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-white">
    <main class="max-w-6xl mx-auto px-6 py-12">
      <header class="flex items-center justify-between gap-4 flex-wrap">
        <div>
          <h1 class="text-3xl font-bold">UpdateMate Dashboard</h1>
          <p class="mt-2 text-slate-400">View your strategy, trial or license state, and renewal reminders.</p>
        </div>
        <a href="/" class="rounded-xl border border-slate-700 px-4 py-2 hover:border-slate-500">Back home</a>
      </header>
      <section class="mt-10 grid gap-6 md:grid-cols-3">
        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
          <h2 class="text-xl font-semibold">Current strategy</h2>
          <p class="mt-3 text-slate-400">Stability First</p>

        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">

          <p class="mt-3 text-slate-400">The production build will connect this view to the activation service.</p>
        </article>
        <article class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
          <h2 class="text-xl font-semibold">Renewal reminder</h2>
          <p class="mt-3 text-slate-400">We'll remind you 5 days before your delay expires.</p>
        </article>
      </section>
