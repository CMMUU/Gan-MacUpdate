<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpdateMate Trial & Activation</title>
    <meta name="description" content="Start your 7-day UpdateMate trial or enter your license key to activate your Mac." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://example.com/login.html" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-white flex items-center justify-center px-6">
    <main class="w-full max-w-xl rounded-3xl border border-slate-800 bg-slate-900 p-8 shadow-2xl shadow-slate-950/50">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold">Trial & Activation</h1>
          <p class="mt-3 text-slate-400 leading-7">Start a 7-day free trial or enter your license key to keep using UpdateMate.</p>
        </div>
        <a href="/" class="text-sm text-emerald-300 hover:text-emerald-200">Back</a>
      </div>
      <section class="mt-8 grid gap-6 md:grid-cols-2">
        <div class="rounded-2xl border border-slate-800 bg-slate-950 p-5">
          <h2 class="text-xl font-semibold">Start trial</h2>
          <p class="mt-2 text-sm text-slate-400">Get 7 days of full access with no credit card required.</p>
          <button class="mt-5 w-full rounded-xl bg-emerald-500 px-4 py-3 font-medium hover:bg-emerald-400">Start trial</button>
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-950 p-5">
          <h2 class="text-xl font-semibold">Activate device</h2>
          <p class="mt-2 text-sm text-slate-400">Enter your license key and bind this Mac to Standard or Pro.</p>
          <input type="text" placeholder="Enter license key" class="mt-5 w-full rounded-xl border border-slate-700 bg-slate-900 px-4 py-3 outline-none focus:border-emerald-500" />
          <button class="mt-4 w-full rounded-xl border border-slate-700 px-4 py-3 font-medium hover:border-slate-500">Verify & activate</button>
        </div>
      </section>
    </main>
  </body>
</html>
